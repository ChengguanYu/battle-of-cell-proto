syntax = "proto3";
package BattleOfCell.Message;
import "Outer/Meta.proto";

// 这个枚举报错是正常的
enum Op
{
    SPAWN = 0;
    LAUNCH = 1;
}

message ServerFrame // IMessage
{
    repeated Frame frames = 1;
    uint64 frame_number = 2; // 帧号
    uint32 random_seed = 3;
    MetaData meta = 4;
}

message ClientFrame // IMessage
{
    repeated Frame frames = 1;
    uint64 frame_number = 2;
}

// 为了防止平台浮点计算差异，使用定点数模拟浮点数 ， 单位取小数点后3位
// 以下为嵌套结构，不作为独立网络消息发送
message Vec2d
{
    int64 x = 1;
    int64 y = 2;
}
message Position2d
{
    int32 x = 1;
    int32 y = 2;
}

message Player
{
    Vec2d direction = 1;
    int64 speed = 2;    // 模拟浮点数
    // 当速度和向量有值的时候 ， 坐标为无效数据 ，用于初始化等阶段
    Position2d position = 3;
    uint32 eid = 4;
}

message Frame
{
    Op op = 2;
    Player data = 3;
}


message EntryRoomReq // IRequest,EntryRoomResp
{
    
}

message EntryRoomResp // IResponse
{
    bool ok = 1;
    repeated RespError error = 2;
}