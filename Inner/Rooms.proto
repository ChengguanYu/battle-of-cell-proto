syntax = "proto3";
package BattleOfCell.Message;

/// Match/Avatar -> Rooms 进入房间请求（旧链路 MatchOrCreate，保留兼容）
message RoomsEnterReq // IAddressRequest,RoomsEnterResp
{
    int64 userId = 1;
}

/// Match/Avatar -> Rooms 进入房间响应（旧链路）
message RoomsEnterResp // IAddressResponse
{
    /// 进入成功后的房间 ID；失败时为 0
    int64 room_id = 2;
}

/// Avatar -> Rooms 玩家离房检查（会话清理等）
message RoomsPlayerLeaveNotify // IAddressMessage
{
    int64 userId = 1;
    /// 离房原因，如 timed_out_grace_expired
    string reason = 2;
}

/// Avatar -> Rooms 主动离房请求（在线退出，等待结果）
message RoomsLeaveReq // IAddressRequest,RoomsLeaveResp
{
    int64 userId = 1;
    /// 离房原因，如 client_leave
    string reason = 2;
}

/// Avatar -> Rooms 主动离房响应
message RoomsLeaveResp // IAddressResponse
{
    /// 离开成功后的房间 ID；失败时为 0
    int64 room_id = 2;
}
/// Avatar -> Rooms 客户端帧转发（业务暂为日志骨架）
message RoomsClientFrameNotify // IAddressMessage
{
    int64 userId = 1;
    uint64 frame_number = 2;
    /// frames 数量，仅供日志/骨架透传，完整操作后续再扩展
    int32 frames_count = 3;
}

/// 房间列表快照条目（非权威，仅供 Match 选房线索）
message RoomSnapItem // IMessage
{
    int64 room_id = 1;
    int32 member_count = 2;
    int32 capacity = 3;
    /// RoomState 枚举底层值：Created=0, Opened=1, Closed=2
    int32 state = 4;
}

/// Match -> Rooms 拉取可观察房间列表快照（只读线索，Join 结果才是权威）
message RoomsGetRoomListSnapReq // IAddressRequest,RoomsGetRoomListSnapResp
{
}

/// Match -> Rooms 房间列表快照响应
message RoomsGetRoomListSnapResp // IAddressResponse
{
    repeated RoomSnapItem rooms = 2;
    /// 是否为空列表；true 表示当前无可观察房间
    bool IsEmpty = 3;
}

/// Match -> Rooms 加入指定房间
message RoomsJoinReq // IAddressRequest,RoomsJoinResp
{
    int64 userId = 1;
    int64 room_id = 2;
}

/// Match -> Rooms 加入指定房间响应
message RoomsJoinResp // IAddressResponse
{
    /// 加入成功后的房间 ID；失败时为 0
    int64 room_id = 2;
}

/// Match -> Rooms 创建房间并加入首位成员
message RoomsCreateReq // IAddressRequest,RoomsCreateResp
{
    int64 userId = 1;
}

/// Match -> Rooms 创建房间响应
message RoomsCreateResp // IAddressResponse
{
    /// 创建成功后的房间 ID；失败时为 0
    int64 room_id = 2;
}

/// Match -> Rooms 创建并进入（纯聚合 Create + Enter，无额外业务）
message RoomsCreateAndEntryReq // IAddressRequest,RoomsCreateAndEntryResp
{
    int64 userId = 1;
}

/// Match -> Rooms 创建并进入响应
message RoomsCreateAndEntryResp // IAddressResponse
{
    /// 成功后的房间 ID；失败时为 0
    int64 room_id = 2;
}

